# Render Blueprint — deploys Commons as a single web service.
#
# The Python backend (agent/server.py) serves:
#   - /api/*  → SSE investigation endpoints
#   - /*      → Static frontend files from homepage/dist/
#
# Build steps (see build.sh):
#   1. Install Python dependencies
#   2. Build the Vite frontend into homepage/dist/
#   3. Seed the SQLite knowledge graph
#
# Environment variables required (set in Render dashboard):
#   GEMINI_API_KEY         — Google Gemini API key for the investigation agent
#   PYTHON_VERSION         — Python version (3.11 recommended)
#
# Optional env vars:
#   VITE_AUTH0_DOMAIN      — Auth0 tenant domain
#   VITE_AUTH0_CLIENT_ID   — Auth0 SPA client ID
#   VITE_AUTH0_REDIRECT_URI — Auth0 redirect (set to your Render URL)
#   VITE_AUTH0_AUDIENCE    — Auth0 API audience
#   TRUEFOUNDRY_BASE_URL   — TrueFoundry AI Gateway URL (if using TF backend)
#   TRUEFOUNDRY_API_KEY    — TrueFoundry API key

services:
  - type: web
    name: commons
    runtime: python
    region: oregon
    plan: free
    buildCommand: ./build.sh
    startCommand: python -m agent.server --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: GEMINI_API_KEY
        sync: false          # must be set manually in Render dashboard
      - key: NODE_VERSION
        value: "20"
      - key: TURSO_DATABASE_URL
        sync: false          # set in dashboard: libsql://commons-graph-kvn8888.aws-us-east-1.turso.io
      - key: TURSO_AUTH_TOKEN
        sync: false          # set in dashboard (JWT token from: turso db tokens create commons-graph)

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commons — Shared Investigation Intelligence</title>
  <meta name="description" content="An agentic investigation platform that detects corruption patterns in public records." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app"></div>

  <script type="module" src="/src/main.ts"></script>

  <!-- Bland AI Tip Line Widget -->
  <script>
    window.blandSettings = {
      widget_id: "abea3c50-4403-4646-8536-8c9497a644eb",
    };
  </script>
  <script src="https://widget.bland.ai/loader.js" defer></script>

  <!-- Fallback: custom green "Call Tip Line" FAB if Bland widget doesn't load -->
  <style>
    .tipline-fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #22c55e;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 14px 22px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Inter', system-ui, sans-serif;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(34, 197, 94, 0.4);
      transition: all 0.2s;
      animation: fab-pulse 2s ease-in-out infinite;
    }
    .tipline-fab:hover {
      background: #16a34a;
      transform: scale(1.05);
      box-shadow: 0 6px 28px rgba(34, 197, 94, 0.5);
    }
    .tipline-fab__icon {
      font-size: 18px;
    }
    @keyframes fab-pulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(34, 197, 94, 0.4); }
      50% { box-shadow: 0 4px 28px rgba(34, 197, 94, 0.6); }
    }
  </style>
  <script>
    // Wait for Bland widget — if it loads, hide our FAB. If not, FAB stays.
    document.addEventListener('DOMContentLoaded', function() {
      var fab = document.getElementById('tipline-fab');
      // Check after 3s if Bland widget loaded
      setTimeout(function() {
        var blandWidget = document.querySelector('[data-bland-widget]') ||
                          document.querySelector('iframe[src*="bland"]') ||
                          document.querySelector('.bland-widget');
        if (blandWidget) {
          // Bland loaded — style it green
          fab.style.display = 'none';
        }
      }, 3000);

      fab.addEventListener('click', function() {
        // Try to open Bland widget if it exists
        var blandBtn = document.querySelector('[data-bland-widget]') ||
                       document.querySelector('.bland-widget button');
        if (blandBtn) {
          blandBtn.click();
        } else {
          // Fallback: scroll to tip line tab
          var tipsTab = document.querySelector('[data-tab="tips"]');
          if (tipsTab) tipsTab.click();
        }
      });
    });
  </script>
  <button id="tipline-fab" class="tipline-fab">
    <span class="tipline-fab__icon">📞</span>
    <span>Call Tip Line</span>
  </button>
</body>
</html>
